<!DOCTYPE html>
<html lang="en">
<head>
    <script src="app.js"></script>
    <meta charset="UTF-8">
    <title>Optoelectronic Simulator GUI</title>
</head>
<body>
    <div class="container">
        <h2>Simulator Parameters</h2>
        <div class="input-group">
            <label for="wellWidth">Well Width (nm):</label>
            <input type="number" id="wellWidth" step="0.1" value="5.0">
        </div>
        <div class="input-group">
            <label for="barrierHeight">Barrier Height (eV):</label>
            <input type="number" id="barrierHeight" step="0.01" value="0.3">
        </div>
        <div class="input-group">
            <label for="effMass">Effective Mass (m0):</label>
            <input type="number" id="effMass" step="0.01" value="0.067">
        </div>
        <button onclick="runSimulation()">Generate & Run</button>
        <div id="status">Status: Ready</div>
    </div>
</body>
</html>
