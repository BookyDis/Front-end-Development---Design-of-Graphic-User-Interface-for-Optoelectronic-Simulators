<form id="simulatorForm">
    <label for="material">Material System</label>
    <select id="material">
        <option value="AlGaAs">GaAs/AlGaAs System</option>
        <option value="AlGaSb">GaSb/AlGaSb System</option>
        <option value="MgZnO">ZnO/MgZnO System</option>
        <option value="InGaAs_InAlAs">InGaAs/InAlAs System</option>
    </select>

    <label for="solver">Solver Approach</label>
    <select id="solver">
        <option value="TMM">Transfer Matrix Method (TMM)</option>
        <option value="FDM">Finite Difference Method (FDM)</option>
    </select>

    <label for="subband_model">Subband Approximation Model</label>
    <select id="subband_model">
        <option value="parabolic">Parabolic Subband Approximation</option>
        <option value="kane">Full Two-Band Kane Nonparabolic Model</option>
        <option value="taylor">Taylor Expansion of Kane Nonparabolic Model</option>
        <option value="14kp">14 kp Band Nonparabolicity Treatment (TMM Only)</option>
    </select>

    <label for="layer_structure">Heterostructure Profile Sequence</label>
    <span class="help-text">Format: Alternate [Width in Å] [Molar Fraction x]. Space separated.</span>
    <textarea id="layer_structure" rows="3" placeholder="e.g., 200 0.15 150 0.0 200 0.15">200 0.15 200 0.0 200 0.15</textarea>

    <div class="form-row">
        <div>
            <label for="electric_field">Electric Field (kV/cm)</label>
            <input type="number" id="electric_field" value="0.0" step="0.1">
        </div>
        <div>
            <label for="grid_spacing">Grid Spacing dz (Å)</label>
            <input type="number" id="grid_spacing" value="1.0" step="0.1">
        </div>
        <div>
            <label for="num_states">Number of Target States</label>
            <input type="number" id="num_states" value="4" step="1">
        </div>
    </div>

    <button type="submit">Execute Calculation</button>
</form>
